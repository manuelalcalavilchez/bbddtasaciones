<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasaciones AlcalÃ¡ â Dashboard</title>
  <style>:root {
  --bg: #0b0f19;
  --panel: #111827;
  --muted: #9ca3af;
  --text: #f3f4f6;
  --accent: #60a5fa;
  --good: #34d399;
  --bad: #fb7185;
  --warn: #fbbf24;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body.page {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
    Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
  background: radial-gradient(1200px 800px at 10% -10%, #0f172a, transparent),
    radial-gradient(1200px 800px at 110% 10%, #0f172a, transparent),
    var(--bg);
  color: var(--text);
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  background: color-mix(in srgb, var(--panel), transparent 10%);
  border-bottom: 1px solid #1f2937;
  backdrop-filter: blur(8px);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.logo {
  display: inline-grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: white;
  font-weight: 700;
  font-size: 13px;
}
.status-pill {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #374151;
  background: #0f172a;
  color: var(--muted);
  font-size: 12px;
}
.status-pill[data-state="ok"] {
  border-color: color-mix(in srgb, var(--good), transparent 60%);
  color: var(--good);
}
.status-pill[data-state="error"] {
  border-color: color-mix(in srgb, var(--bad), transparent 60%);
  color: var(--bad);
}
.container {
  max-width: 980px;
  margin: 24px auto;
  padding: 0 24px;
  display: grid;
  gap: 16px;
}
.panel {
  background: var(--panel);
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 18px;
}
.panel h2 {
  margin: 0 0 14px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}
.kv {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
@media (max-width: 520px) {
  .kv { grid-template-columns: 1fr; }
}
.label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.value {
  font-size: 18px;
  font-weight: 600;
}
.meta {
  margin-top: 14px;
  display: grid;
  gap: 6px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
    "Liberation Mono", monospace;
  font-size: 12px;
  color: var(--muted);
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.btn {
  appearance: none;
  border: 0;
  padding: 10px 12px;
  border-radius: 10px;
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  color: white;
  font-weight: 600;
  cursor: pointer;
}
.btn.secondary {
  background: #111827;
  border: 1px solid #374151;
  color: var(--text);
}
.btn:active {
  transform: translateY(1px);
}
.log {
  margin-top: 14px;
  padding: 12px;
  border-radius: 10px;
  background: #0b1220;
  border: 1px solid #1f2937;
  color: #cbd5e1;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
    "Liberation Mono", monospace;
  font-size: 12px;
  min-height: 6em;
  white-space: pre-wrap;
}
.footer {
  max-width: 980px;
  margin: 24px auto;
  padding: 0 24px 36px;
  color: var(--muted);
  font-size: 12px;
}
.footer a {
  color: var(--accent);
  text-decoration: none;
}
</style>
</head>
<body class="page">
  <header class="topbar">
    <div class="brand">
      <span class="logo">TA</span>
      <span>Tasaciones AlcalÃ¡</span>
    </div>
    <div class="status-pill" id="connectionStatus" data-state="idle">Conectandoâ¦</div>
  </header>
  <main class="container">
    <section class="panel">
      <h2>Estado del servicio</h2>
      <div class="kv">
        <div>
          <div class="label">Frontend</div>
          <div class="value" id="frontendStatus">â</div>
        </div>
        <div>
          <div class="label">API</div>
          <div class="value" id="apiStatus">â</div>
        </div>
      </div>
      <div class="meta">
        <div id="frontendUrl">url: â</div>
        <div id="apiUrl">api: â</div>
      </div>
    </section>
    <section class="panel">
      <h2>Acciones</h2>
      <div class="actions">
        <button class="btn" id="btnPingApi" type="button">Probar API ahora</button>
        <button class="btn secondary" id="btnReload" type="button">Recargar</button>
      </div>
      <pre class="log" id="log">Esperando interacciÃ³nâ¦</pre>
    </section>
  </main>
  <footer class="footer">
    <span>Repositorio: https://github.com/manuelalcalavilchez/bbddtasaciones</span>
  </footer>
  <script>(function () {
  const state = {
    apiBase: 'https://n8n-postgrest-api.n9xpuu.easypanel.host',
    frontendBase: location.href,
  };

  const els = {
    connectionStatus: document.getElementById('connectionStatus'),
    frontendStatus: document.getElementById('frontendStatus'),
    apiStatus: document.getElementById('apiStatus'),
    frontendUrl: document.getElementById('frontendUrl'),
    apiUrl: document.getElementById('apiUrl'),
    log: document.getElementById('log'),
    btnPingApi: document.getElementById('btnPingApi'),
    btnReload: document.getElementById('btnReload'),
  };

  const set = (el, text, cls) => {
    if (!el) return;
    el.textContent = text;
    if (cls) {
      el.className = cls;
    }
  };

  const log = (text) => {
    if (!els.log) return;
    const lines = [text, els.log.textContent];
    els.log.textContent = lines.join(`\n`);
  };

  const setStatus = (el, status, text) => {
    if (!el) return;
    el.textContent = status;
    el.className = 'value ' + (text === 'ok' ? 'text-success' : 'text-danger');
  };

  const bootstrapFrontend = () => {
    setStatus(els.frontendStatus, 'servido');
    if (els.frontendUrl) {
      els.frontendUrl.textContent = 'url: ' + state.frontendBase;
    }
  };

  const summarizeResponse = (res) => {
    if (!res) {
      return 'failed';
    }
    if (res.ok) {
      return 'ok';
    }
    if (res.status === 0) {
      return 'unknown';
    }
    if (res.status >= 500) {
      return `server ${res.status}`;
    }
    if (res.status >= 400) {
      return `client ${res.status}`;
    }
    return `${res.status}`;
  };

  const bootstrapApiPing = async () => {
    if (!els.apiStatus) return;
    if (!state.apiBase) {
      setStatus(els.apiStatus, 'api no configurada', 'warn');
      return;
    }

    try {
      const res = await fetch(`${state.apiBase}/`, { method: 'HEAD' });
      setStatus(els.apiStatus, summarizeResponse(res));
      log(`api -> ${state.apiBase}`);
    } catch (error) {
      setStatus(els.apiStatus, 'error');
      log(`api error -> ${error}`);
    }
  };

  const handlePingApi = async () => {
    if (!els.apiStatus) return;
    setStatus(els.apiStatus, 'probando...');
    await bootstrapApiPing();
  };

  const init = () => {
    els.connectionStatus.setAttribute('data-state', 'ok');
    set(els.connectionStatus, 'ok');
    bootstrapFrontend();
    if (els.apiBase) {
      bootstrapApiPing();
    }
    if (els.btnPingApi) {
      els.btnPingApi.addEventListener('click', handlePingApi);
    }
    if (els.btnReload) {
      els.btnReload.addEventListener('click', () => location.reload());
    }
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
