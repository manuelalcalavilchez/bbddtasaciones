<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Tasaciones - BBDDTasaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header glass-effect">
            <h1>Panel de Control Geoespacial</h1>
            <p>Sistema de Auditoría de Tasaciones e Importación JSON</p>
        </header>

        <section class="map-section glass-effect">
            <div id="map"></div>
        </section>

        <section class="auditoria-section">
            <div class="section-title">
                <h2>Auditoría de Registro Completo</h2>
                <p>Historial y metadatos detallados de los elementos validados</p>
            </div>
            
            <div id="contenedor-fichas-auditoria" class="fichas-grid">
                <div class="glass-effect loading-placeholder">Cargando registros de auditoría...</div>
            </div>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
