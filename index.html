<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEO-VALUATION | Panel de Tasaciones</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0b0f19;
      --panel: #111827;
      --panel2: #1a2235;
      --muted: #9ca3af;
      --text: #f3f4f6;
      --accent: #60a5fa;
      --good: #34d399;
      --bad: #fb7185;
      --warn: #fbbf24;
      --border: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
    }
    .logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: grid; place-items: center;
      font-size: 12px; font-weight: 800;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .nav-tab {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .nav-tab:hover { background: var(--panel2); color: var(--text); }
    .nav-tab.active { background: var(--accent); color: #000; }
    .user-info {
      font-size: 12px;
      color: var(--muted);
    }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .search-box {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .filter-select {
      flex: 1;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    /* STATS */
    .stats-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      background: var(--panel2);
    }
    .stat-card .num {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-card .lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .stat-card.pending .num { color: var(--warn); }
    .stat-card.active .num { color: var(--accent); }
    .stat-card.done .num { color: var(--good); }

    /* EXPEDIENTE LIST */
    .expediente-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .expediente-item {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.15s;
    }
    .expediente-item:hover {
      background: var(--panel2);
      border-color: var(--border);
    }
    .expediente-item.selected {
      background: rgba(96,165,250,0.1);
      border-color: var(--accent);
    }
    .expediente-ref {
      font-family: monospace;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .expediente-owner {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .expediente-loc {
      font-size: 11px;
      color: var(--muted);
    }
    .expediente-val {
      font-size: 12px;
      font-weight: 600;
      color: var(--good);
      text-align: right;
      margin-top: 2px;
    }
    .expediente-status {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 4px;
    }
    .status-Pendiente { background: rgba(251,191,36,0.15); color: var(--warn); }
    .status-En-proceso { background: rgba(96,165,250,0.15); color: var(--accent); }
    .status-Finalizado { background: rgba(52,211,153,0.15); color: var(--good); }

    /* CONTENT AREA */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* MAP */
    #map {
      flex: 1;
      min-height: 300px;
    }

    /* DETAIL PANEL */
    .detail-panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      max-height: 45%;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .detail-panel h4 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .detail-field {
      background: var(--panel2);
      padding: 10px;
      border-radius: 8px;
    }
    .detail-field .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .detail-field .value {
      font-size: 14px;
      font-weight: 500;
    }
    .detail-field .value.empty {
      color: var(--muted);
      font-style: italic;
    }

    /* IMPORT PANEL */
    .import-panel {
      padding: 20px;
      display: none;
    }
    .import-panel.active { display: block; }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(96,165,250,0.05);
    }
    .drop-zone .icon { font-size: 40px; margin-bottom: 10px; }
    .drop-zone p { color: var(--muted); font-size: 14px; }
    .import-log {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* TABLE VIEW */
    .table-view {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: none;
    }
    .table-view.active { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: sticky;
      top: 0;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--panel2); }
    tr.selected td { background: rgba(96,165,250,0.1); }

    /* LEAFLET OVERRIDES */
    .leaflet-container { background: #0b0f19 !important; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .main { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">
    <div class="logo">GV</div>
    <span>GEO-VALUATION</span>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="dashboard">Dashboard</button>
    <button class="nav-tab" data-view="import">Importar JSON</button>
  </nav>
  <div class="user-info" id="userInfo">Cargando...</div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Expedientes</h3>
      <input type="text" class="search-box" id="searchBox" placeholder="Ref, propietario, paraje...">
      <div class="filter-row">
        <select class="filter-select" id="filterTipo">
          <option value="">Todos los tipos</option>
          <option value="Finca Rústica">Finca Rústica</option>
          <option value="Invernadero">Invernadero</option>
          <option value="Solar Urbano">Solar Urbano</option>
        </select>
        <select class="filter-select" id="filterEstado">
          <option value="">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="En proceso">En proceso</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card pending">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-card active">
        <div class="num" id="statActivos">0</div>
        <div class="lbl">Activos</div>
      </div>
      <div class="stat-card done">
        <div class="num" id="statFinalizados">0</div>
        <div class="lbl">Finalizados</div>
      </div>
    </div>

    <div class="expediente-list" id="expedienteList">
      <p style="color:var(--muted);font-size:13px;padding:12px;">Cargando expedientes...</p>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD VIEW -->
    <div id="dashboardView">
      <div id="map"></div>
      <div class="detail-panel" id="detailPanel" style="display:none;">
        <h4>Detalle del Informe</h4>
        <div class="detail-grid" id="detailGrid"></div>
      </div>
    </div>

    <!-- IMPORT VIEW -->
    <div class="import-panel" id="importView">
      <h2 style="margin-bottom:16px;">Importador de Informes JSON</h2>
      <div class="drop-zone" id="dropZone">
        <div class="icon">📄</div>
        <p>Arrastra el archivo JSON del informe aquí</p>
        <p style="font-size:12px;margin-top:4px;">o haz clic para seleccionar</p>
        <input type="file" id="fileInput" accept=".json" style="display:none;">
      </div>
      <div class="import-log" id="importLog">Esperando archivo...</div>
    </div>

  </div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
